gpu:
  index: 0
  # Use [] for true baseline (no lock), or put target clocks to sweep.
  # Example: [2505, 2265, 2025, 1785, 1545, 1305, 1185]
  clocks_mhz: []
  sample_interval_ms: 100

benchmark:
  # Change this per workload scenario so outputs stay separated.
  job_name: custom_app_scene_a
  # Replace with your real application command.
  # Keep the command deterministic and same input each run.
  command: "python benchmarks/pytorch_workload_bench.py --kind mixed --size 4096 --repeats 50 --steps 10 --warmup-steps 1"
  warmup_seconds: 2
  repeats: 3

output:
  root_dir: data/raw
